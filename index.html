<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flappy Bird mit Bäumen</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100vh;
      height: 100dvh;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
    }
    body {
      display: grid;
      place-items: center;
      background: #aee9ff;
      font-family: Arial, sans-serif;
      touch-action: none;
    }
    #gameContainer {
      position: relative;
      width: min(100vw, calc(100vh * 2 / 3));
      height: min(100vh, calc(100vw * 3 / 2));
      width: min(100vw, calc(100dvh * 2 / 3));
      height: min(100dvh, calc(100vw * 3 / 2));
    }
    canvas {
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      background: #87ceeb;
      display: block;
      border: 2px solid #555;
    }
    #continueButton {
      display: none;
      position: absolute;
      left: 50%;
      top: 75%;
      z-index: 1;
      transform: translateX(-50%);
      padding: 10px 24px;
      border: 0;
      border-radius: 8px;
      background: #228B22;
      color: #fff;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
    }
    #continueButton:hover { background: #196f19; }
    #continueButton:focus-visible { outline: 3px solid #333; outline-offset: 3px; }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="game" width="400" height="600"></canvas>
    <button id="continueButton" type="button">Weiter</button>
  </div>
  <script type="module">
    import { submitScores } from "../submitScores.js";

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const continueButton = document.getElementById('continueButton');

    // Vogel Eigenschaften
    let bird = { x: 80, y: 300, w: 30, h: 30, velocity: 2, gravity: 0.15, jump: -4.5 };

    // Baum-Hindernisse
    let trees = [];
    let treeGap = 150;
    let treeWidth = 60;
    let treeSpeed = 2;
    let score = 0;
    let gameOver = false;
    let groundHeight = 40; // Höhe des Bodens
    const birdHitRadius = 12;
    const collisionPadding = 3;
    const fixedTimeStep = 1000 / 100;
    const maxFrameTime = 250;
    let lastTimestamp = null;

    // Wolken-Array
    let clouds = [
      {x: 50, y: 80, r: 30, dx: 0.3},
      {x: 200, y: 60, r: 25, dx: 0.2},
      {x: 320, y: 100, r: 35, dx: 0.25},
      {x: 120, y: 150, r: 20, dx: 0.18}
    ];

    function resetGame() {
      bird.y = 300;
      bird.velocity = 0;
      trees = [];
      gameOver = false;
      lastTimestamp = null;
    }

    function drawBird() {
      ctx.save();
      ctx.fillStyle = "#e74c3c";
      ctx.beginPath();
      ctx.ellipse(bird.x, bird.y, bird.w/2, bird.h/2, 0, 0, Math.PI*2);
      ctx.fill();
      // Auge
      ctx.fillStyle = "#fff";
      ctx.beginPath();
      ctx.arc(bird.x+8, bird.y-5, 5, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = "#222";
      ctx.beginPath();
      ctx.arc(bird.x+10, bird.y-5, 2, 0, Math.PI*2);
      ctx.fill();
      // Schnabel
      ctx.fillStyle = "#f9d71c";
      ctx.beginPath();
      ctx.moveTo(bird.x+15, bird.y);
      ctx.lineTo(bird.x+25, bird.y-5);
      ctx.lineTo(bird.x+15, bird.y+5);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawTrees() {
      trees.forEach(tree => {
        // Baumstamm oben
        ctx.fillStyle = "#deb887"; // Hellbraun
        ctx.fillRect(tree.x, 0, treeWidth, tree.top);

        // Holzmaserung oben
        ctx.fillStyle = "#a97c50";
        ctx.fillRect(tree.x + treeWidth/2 - 5, 0, 10, tree.top);

        // Baumkrone oben
        ctx.beginPath();
        ctx.arc(tree.x + treeWidth/2, tree.top, treeWidth/2 + 5, Math.PI, 0, false);
        ctx.fillStyle = "#228B22";
        ctx.fill();

        // Baumstamm unten
        ctx.fillStyle = "#deb887";
        ctx.fillRect(tree.x, tree.bottom, treeWidth, canvas.height - tree.bottom);

        // Holzmaserung unten
        ctx.fillStyle = "#a97c50";
        ctx.fillRect(tree.x + treeWidth/2 - 5, tree.bottom, 10, canvas.height - tree.bottom);

        // Baumkrone unten
        ctx.beginPath();
        ctx.arc(tree.x + treeWidth/2, tree.bottom, treeWidth/2 + 5, 0, Math.PI, false);
        ctx.fillStyle = "#228B22";
        ctx.fill();
      });
    }

    function moveTrees(stepScale) {
      trees.forEach(tree => tree.x -= treeSpeed * stepScale);
      // Entferne Bäume, die aus dem Bild sind
      if (trees.length && trees[0].x + treeWidth < 0) trees.shift();
    }

    function spawnTree() {
      const top = Math.random() * (canvas.height - treeGap - 100) + 50;
      const bottom = top + treeGap;
      trees.push({ x: canvas.width, top, bottom });
    }

    function drawGround() {
      ctx.fillStyle = "#228B22"; // Grün
      ctx.fillRect(0, canvas.height - groundHeight, canvas.width, groundHeight);
      // Optional: kleine Grasbüschel
      for (let i = 0; i < canvas.width; i += 30) {
        ctx.beginPath();
        ctx.arc(i + 15, canvas.height - groundHeight, 10, Math.PI, 0, false);
        ctx.fillStyle = "#a3c96b";
        ctx.fill();
      }
    }

    function drawClouds() {
      clouds.forEach(cloud => {
        // Hauptwolke
        ctx.fillStyle = "rgba(255,255,255,0.85)";
        ctx.beginPath();
        ctx.arc(cloud.x, cloud.y, cloud.r, 0, Math.PI*2);
        ctx.fill();
        // Kleine Wolken
        ctx.beginPath();
        ctx.arc(cloud.x + cloud.r*0.7, cloud.y + 8, cloud.r*0.7, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cloud.x - cloud.r*0.7, cloud.y + 5, cloud.r*0.6, 0, Math.PI*2);
        ctx.fill();
      });
    }

    function moveClouds(stepScale) {
      clouds.forEach(cloud => {
        cloud.x += cloud.dx * stepScale;
        if (cloud.x - cloud.r > canvas.width) cloud.x = -cloud.r;
      });
    }

    async function handleGameOver() {
      if (!gameOver) {
        gameOver = true;
        continueButton.style.display = 'block';
        await submitScores("Flappy Bird", score);
      }
    }

    function checkCollision() {
      // Boden oder Decke
      if (bird.y + birdHitRadius > canvas.height - groundHeight || bird.y - birdHitRadius < 0) {
        handleGameOver();
      }
      // Bäume
      trees.forEach(tree => {
        const overlapsTree =
          bird.x + birdHitRadius > tree.x + collisionPadding &&
          bird.x - birdHitRadius < tree.x + treeWidth - collisionPadding;
        const hitsGapEdge =
          bird.y - birdHitRadius < tree.top - collisionPadding ||
          bird.y + birdHitRadius > tree.bottom + collisionPadding;

        if (
          overlapsTree &&
          hitsGapEdge
        ) {
          handleGameOver();
        }
      });
    }

    function drawScore() {
      ctx.fillStyle = "#222";
      ctx.font = "24px Arial";
      ctx.fillText("Score: " + score, 10, 40);
    }

    function updateGame(stepScale) {
      moveClouds(stepScale);

      // Vogel bewegen
      bird.velocity += bird.gravity * stepScale;
      bird.y += bird.velocity * stepScale;

      // Bäume bewegen
      moveTrees(stepScale);

      // Kollision prüfen
      checkCollision();
      if (gameOver) return;

      // Bäume erzeugen
      if (trees.length === 0 || trees[trees.length-1].x < canvas.width - 220) {
        spawnTree();
      }

      // Score erhöhen
      trees.forEach(tree => {
        if (!tree.passed && bird.x > tree.x + treeWidth) {
          score++;
          tree.passed = true;
        }
      });
    }

    function drawGame() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      drawClouds(); // Wolken im Hintergrund
      drawGround(); // Boden zeichnen

      if (gameOver) {
        ctx.fillStyle = "#e74c3c";
        ctx.font = "48px Arial";
        ctx.fillText("Game Over!", 60, 300);
        ctx.font = "28px Arial";
        ctx.fillStyle = "#222";
        ctx.fillText("Score: " + score, 140, 350);
        ctx.font = "20px Arial";
        ctx.save();
        ctx.textAlign = "center";
        ctx.fillText("Klicke auf „Weiter“,", canvas.width / 2, 400);
        ctx.fillText("um neu zu starten!", canvas.width / 2, 425);
        ctx.restore();
        return;
      }

      // Bäume zeichnen
      drawTrees();

      // Vogel zeichnen
      drawBird();

      // Score anzeigen
      drawScore();
    }

    function gameLoop(timestamp) {
      if (lastTimestamp === null) {
        lastTimestamp = timestamp;
      }

      const elapsed = Math.min(timestamp - lastTimestamp, maxFrameTime);
      lastTimestamp = timestamp;
      const stepScale = elapsed / fixedTimeStep;

      if (!gameOver) {
        updateGame(stepScale);
      }

      drawGame();

      if (!gameOver) {
        requestAnimationFrame(gameLoop);
      }
    }

    // Steuerung
    function flap() {
      if (gameOver) return;
      bird.velocity = bird.jump;
    }

    document.addEventListener('keydown', function(e) {
      if (e.code === "Space") {
        e.preventDefault();
        flap();
      }
    });
    document.addEventListener('touchmove', function(e) {
      e.preventDefault();
    }, { passive: false });
    document.addEventListener('pointerdown', function(e) {
      if (!e.isPrimary || (e.pointerType === "mouse" && e.button !== 0)) return;
      e.preventDefault();
      flap();
    });
    continueButton.addEventListener('pointerdown', function(e) {
      e.stopPropagation();
    });
    continueButton.addEventListener('click', function() {
      if (!gameOver) return;
      score = 0;
      continueButton.style.display = 'none';
      resetGame();
      requestAnimationFrame(gameLoop);
    });

    resetGame();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
